<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>UFO Sichtungen – wata f*ck</title>
    <link rel="stylesheet" href="style.css" />
</head>
<body>
    <!-- UFO-Loader: erscheint, solange Daten geladen werden -->
    <div id="ufo-loader" class="ufo-loader" role="status" aria-live="polite">
        <div class="ufo-loader__stage">
            <svg class="ufo-loader__ufo" viewBox="0 0 200 130" xmlns="http://www.w3.org/2000/svg">
                <defs>
                    <radialGradient id="ufo-glow" cx="80%" cy="130%" r="80%">
                        <stop offset="0%" stop-color="#22d3ee" stop-opacity="0.7"/>
                        <stop offset="100%" stop-color="#22d3ee" stop-opacity="0"/>
                    </radialGradient>
                    <linearGradient id="ufo-saucer" x1="0%" y1="0%" x2="0%" y2="100%">
                        <stop offset="0%" stop-color="#cbd5e1"/>
                        <stop offset="50%" stop-color="#f1f5f9"/>
                        <stop offset="100%" stop-color="#64748b"/>
                    </linearGradient>
                    <linearGradient id="ufo-dome" x1="0%" y1="0%" x2="0%" y2="100%">
                        <stop offset="0%" stop-color="#67e8f9" stop-opacity="0.95"/>
                        <stop offset="100%" stop-color="#0891b2" stop-opacity="0.75"/>
                    </linearGradient>
                </defs>
                <!-- Lichtschein -->
                <ellipse cx="100" cy="118" rx="60" ry="8" fill="url(#ufo-glow)"/>
                <path d="M 65 78 L 48 120 L 152 120 L 135 78 Z" fill="#22d3ee" opacity="0.18"/>
                <!-- Untertasse -->
                <ellipse cx="100" cy="78" rx="80" ry="15" fill="url(#ufo-saucer)" stroke="#1f2937" stroke-width="1"/>
                <ellipse cx="100" cy="83" rx="78" ry="5" fill="#1f2937"/>
                <ellipse cx="100" cy="73" rx="80" ry="3" fill="#fff" opacity="0.55"/>
                <!-- Kuppel -->
                <path d="M 65 73 A 35 32 0 0 1 135 73 Z" fill="url(#ufo-dome)" stroke="#0e7490" stroke-width="1"/>
                <ellipse cx="85" cy="56" rx="12" ry="5" fill="#fff" opacity="0.4"/>
                <!-- Alien -->
                <ellipse cx="100" cy="64" rx="13" ry="11" fill="#a78bfa"/>
                <ellipse cx="93" cy="62" rx="4" ry="5" fill="#fff"/>
                <ellipse cx="107" cy="62" rx="4" ry="5" fill="#fff"/>
                <ellipse cx="93" cy="63" rx="2" ry="2.5" fill="#0a0e1a"/>
                <ellipse cx="107" cy="63" rx="2" ry="2.5" fill="#0a0e1a"/>
                <circle cx="86" cy="68" r="2" fill="#fb7185" opacity="0.75"/>
                <circle cx="114" cy="68" r="2" fill="#fb7185" opacity="0.75"/>
                <line x1="92" y1="53" x2="88" y2="44" stroke="#a78bfa" stroke-width="1.5" stroke-linecap="round"/>
                <line x1="108" y1="53" x2="112" y2="44" stroke="#a78bfa" stroke-width="1.5" stroke-linecap="round"/>
                <circle cx="88" cy="42" r="2" fill="#fbbf24"/>
                <circle cx="112" cy="42" r="2" fill="#fbbf24"/>
                <!-- Blinkende Lichter -->
                <circle cx="32" cy="80" r="3" fill="#22d3ee">
                    <animate attributeName="opacity" values="1;0.25;1" dur="1.2s" repeatCount="indefinite"/>
                </circle>
                <circle cx="100" cy="86" r="3" fill="#fbbf24">
                    <animate attributeName="opacity" values="1;0.25;1" dur="1.2s" begin="0.4s" repeatCount="indefinite"/>
                </circle>
                <circle cx="168" cy="80" r="3" fill="#fb7185">
                    <animate attributeName="opacity" values="1;0.25;1" dur="1.2s" begin="0.8s" repeatCount="indefinite"/>
                </circle>
            </svg>
        </div>
        <p class="ufo-loader__text">Empfange Signale aus dem Universum…</p>
    </div>

    <!-- UFO-Maskottchen: fliegt beim Scrollen über die Seite -->
    <div class="ufo-mascot" aria-hidden="true">
        <svg viewBox="0 0 200 130" xmlns="http://www.w3.org/2000/svg">
            <ellipse cx="100" cy="118" rx="55" ry="7" fill="#22d3ee" opacity="0.35"/>
            <path d="M 65 78 L 48 120 L 152 120 L 135 78 Z" fill="#22d3ee" opacity="0.2"/>
            <ellipse cx="100" cy="78" rx="80" ry="15" fill="#cbd5e1" stroke="#1f2937" stroke-width="1"/>
            <ellipse cx="100" cy="83" rx="78" ry="5" fill="#1f2937"/>
            <ellipse cx="100" cy="73" rx="80" ry="3" fill="#fff" opacity="0.55"/>
            <path d="M 65 73 A 35 32 0 0 1 135 73 Z" fill="#67e8f9" opacity="0.85" stroke="#0e7490" stroke-width="1"/>
            <ellipse cx="85" cy="56" rx="12" ry="5" fill="#fff" opacity="0.4"/>
            <ellipse cx="100" cy="64" rx="13" ry="11" fill="#a78bfa"/>
            <ellipse cx="93" cy="62" rx="4" ry="5" fill="#fff"/>
            <ellipse cx="107" cy="62" rx="4" ry="5" fill="#fff"/>
            <ellipse cx="93" cy="63" rx="2" ry="2.5" fill="#0a0e1a"/>
            <ellipse cx="107" cy="63" rx="2" ry="2.5" fill="#0a0e1a"/>
            <circle cx="86" cy="68" r="2" fill="#fb7185" opacity="0.75"/>
            <circle cx="114" cy="68" r="2" fill="#fb7185" opacity="0.75"/>
            <line x1="92" y1="53" x2="88" y2="44" stroke="#a78bfa" stroke-width="1.5" stroke-linecap="round"/>
            <line x1="108" y1="53" x2="112" y2="44" stroke="#a78bfa" stroke-width="1.5" stroke-linecap="round"/>
            <circle cx="88" cy="42" r="2" fill="#fbbf24"/>
            <circle cx="112" cy="42" r="2" fill="#fbbf24"/>
            <circle cx="32" cy="80" r="3" fill="#22d3ee"/>
            <circle cx="100" cy="86" r="3" fill="#fbbf24"/>
            <circle cx="168" cy="80" r="3" fill="#fb7185"/>
        </svg>
    </div>

    <header class="site-header">
        <h1>TEST</h1>
    </header>
    <main>
        <h2>TEST_2</h2>


    </main>

    <script type="module" src="app.js"></script>
</body>
</html>
