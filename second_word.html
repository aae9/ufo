<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>UFO Sichtungen – Second World</title>
    <link rel="stylesheet" href="style.css" />
    <style>
        /* Vollflächiger schwarzer Hintergrund für die p5-Bühne */
        html, body {
            margin: 0;
            padding: 0;
            background: #04060f;
            overflow: hidden;
            height: 100%;
        }

        main.stage {
            position: fixed;
            inset: 0;
            margin: 0;
            padding: 0;
            max-width: none;
        }

        canvas {
            display: block;
        }

        /* Hud-Overlay */
        .hud {
            position: fixed;
            top: 1.25rem;
            left: 1.5rem;
            z-index: 10;
            color: var(--text-primary);
            pointer-events: none;
            font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
        }

        .hud__title {
            font-size: 0.85rem;
            letter-spacing: 0.25em;
            text-transform: uppercase;
            color: var(--text-muted);
            margin: 0 0 0.25rem;
        }

        .hud__subtitle {
            font-size: 1.5rem;
            font-weight: 600;
            margin: 0;
            background: linear-gradient(135deg, #e8ecf4 0%, #6b8cff 100%);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .hud__hint {
            position: fixed;
            bottom: 1.25rem;
            left: 1.5rem;
            color: var(--text-muted);
            font-size: 0.75rem;
            letter-spacing: 0.18em;
            text-transform: uppercase;
            font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
            pointer-events: none;
            z-index: 10;
        }

        .back-link {
            position: fixed;
            top: 1.25rem;
            right: 1.5rem;
            z-index: 10;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.5rem 1rem;
            background: rgba(19, 24, 40, 0.7);
            color: var(--text-primary);
            border: 1px solid var(--border-strong);
            border-radius: 999px;
            text-decoration: none;
            font-size: 0.85rem;
            font-family: var(--font-sans);
            letter-spacing: 0.04em;
            backdrop-filter: blur(10px);
            transition: border-color 0.2s ease, color 0.2s ease, transform 0.2s ease;
        }

        .back-link:hover {
            border-color: var(--accent);
            color: var(--accent);
            transform: translateX(-2px);
        }

        .back-link__arrow {
            transition: transform 0.2s ease;
        }

        .back-link:hover .back-link__arrow {
            transform: translateX(-3px);
        }
    </style>
</head>
<body>
    <main class="stage">
        <header class="hud">
            <p class="hud__title">Transmission · Channel 02</p>
            <h1 class="hud__subtitle">Second World</h1>
        </header>

        <a class="back-link" href="index.html">
            <span class="back-link__arrow">←</span>
            <span>Zurück zu den Daten</span>
        </a>

        <p class="hud__hint">Maus = Tilt · Klick / G = Glitch · M = Modus · F = Fullscreen</p>
    </main>

    <!-- p5.js von CDN -->
    <script src="https://cdn.jsdelivr.net/npm/p5@1.9.4/lib/p5.min.js"></script>
    <script src="p5x.js?v=9"></script>
</body>
</html>
